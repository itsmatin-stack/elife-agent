<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E LIFE — Saved</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="E LIFE">
  <link rel="apple-touch-icon" href="../assets/icon.svg">
  <link rel="icon" href="../assets/icon.svg">
  <link rel="stylesheet" href="../assets/core.css">
  <style>
  @media(max-width:768px){
    .sb{position:fixed;top:0;bottom:0;left:0;z-index:100;transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
    .sb.collapsed{transform:translateX(-100%);}
    .main{width:100%;}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr!important;}
    .page-content{padding:12px;}
  }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Personal</div>
      <a class="si" href="tasks.html"><i class="ti ti-checkbox"></i><div class="si-body"><div class="si-name">Tasks</div></div></a>
      <a class="si" href="notes.html"><i class="ti ti-note"></i><div class="si-body"><div class="si-name">Notes</div></div></a>
      <a class="si active" href="saved.html"><i class="ti ti-heart"></i><div class="si-body"><div class="si-name">Saved</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">Saved</div><div class="tb-icons"><i class="ti ti-plus" onclick="openModal('addModal')"></i></div></div>
    <div class="page-content" id="savedContent"></div>
  </div>
</div>
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Naya Save <i class="ti ti-x" onclick="closeModal('addModal')"></i></div>
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="sTitle" placeholder="Kya save karna hai..."/></div>
    <div class="form-group"><label class="form-label">Content / Link</label><textarea class="form-input" id="sContent" rows="3" placeholder="Content ya URL..."></textarea></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-input" id="sCat"><option>General</option><option>Link</option><option>Quote</option><option>Idea</option><option>Business</option></select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addSaved()"><i class="ti ti-heart"></i>Save</button>
    </div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
let saved=loadData('saved',[]);
const catColors={General:'var(--acc2)',Link:'var(--green2)',Quote:'var(--amber2)',Idea:'#EDE9FE',Business:'var(--red2)'};
const catText={General:'var(--acc)',Link:'var(--green)',Quote:'#633806',Idea:'#5B21B6',Business:'var(--red)'};

function addSaved(){
  const title=document.getElementById('sTitle').value.trim();
  if(!title){showToast('Title zaroori hai!','error');return;}
  saved.push({id:genId(),title,content:document.getElementById('sContent').value.trim(),cat:document.getElementById('sCat').value,created:new Date().toISOString()});
  saveData('saved',saved);
  ['sTitle','sContent'].forEach(id=>document.getElementById(id).value='');
  closeModal('addModal'); render();
  showToast('Save ho gaya!','success');
}

function deleteSaved(id){saved=saved.filter(s=>s.id!==id);saveData('saved',saved);render();}

function render(){
  const el=document.getElementById('savedContent');
  if(saved.length===0){el.innerHTML=`<div class="empty-state" style="margin-top:60px;"><i class="ti ti-heart"></i><h3>Kuch saved nahi</h3><p>Plus se links, quotes, ideas save karo</p></div>`;return;}
  el.innerHTML=saved.slice().reverse().map(s=>`
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <span style="padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;background:${catColors[s.cat]||'var(--acc2)'};color:${catText[s.cat]||'var(--acc)'};">${s.cat}</span>
        <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;color:var(--text);">${s.title}</div>${s.content?`<div style="font-size:13px;font-weight:600;color:var(--muted);margin-top:4px;">${s.content.startsWith('http')?`<a href="${s.content}" target="_blank" style="color:var(--acc);">${s.content}</a>`:s.content}</div>`:''}</div>
        <i class="ti ti-trash" style="font-size:16px;color:var(--muted);cursor:pointer;flex-shrink:0;" onclick="deleteSaved('${s.id}')"></i>
      </div>
    </div>`).join('');
}
render();
</script>

<!-- Mobile Bottom Nav -->
<nav class="mob-nav">
  <a class="mob-nav-item" href="../index.html"><i class="ti ti-message-circle"></i><span>Chat</span></a>
  <a class="mob-nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
  <a class="mob-nav-item" href="tasks.html"><i class="ti ti-checkbox"></i><span>Tasks</span></a>
  <a class="mob-nav-item" href="customers.html"><i class="ti ti-users"></i><span>Customers</span></a>
  <a class="mob-nav-item" href="settings.html"><i class="ti ti-settings"></i><span>Settings</span></a>
</nav>
</body>
</html>
