  <link rel="stylesheet" href="../assets/core.css">
  <style>
  @media(max-width:768px){
    .sb{position:fixed;top:0;bottom:0;left:0;z-index:100;transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.15);}

<style>
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;margin-bottom:16px;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--acc3);background:var(--acc2);}
.drop-zone i{font-size:32px;color:var(--muted);display:block;margin-bottom:8px;}
.drop-zone p{font-size:14px;font-weight:600;color:var(--muted);}
.file-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;}
.file-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.file-icon i{font-size:18px;}
</style>

    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Tools</div>
      <a class="si active" href="files.html"><i class="ti ti-folder"></i><div class="si-body"><div class="si-name">Files</div></div></a>
      <a class="si" href="research.html"><i class="ti ti-search"></i><div class="si-body"><div class="si-name">Research</div></div></a>
      <a class="si" href="code.html"><i class="ti ti-code"></i><div class="si-body"><div class="si-name">Code</div></div></a>
      <a class="si" href="translate.html"><i class="ti ti-language"></i><div class="si-body"><div class="si-name">Translate</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">Files</div></div>
    <div class="page-content">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-cloud-upload"></i>
        <p>File yahan drop karo ya click karo</p>
        <p style="font-size:12px;margin-top:4px;">Text, PDF, Images — AI analyze karega</p>
        <input type="file" id="fileInput" style="display:none" multiple onchange="handleFiles(event)" accept=".txt,.pdf,.jpg,.jpeg,.png,.csv,.json,.md"/>
      </div>
      <div id="fileList"></div>
      <div id="fileAnalysis" style="display:none;" class="card">
        <div class="card-title">AI Analysis</div>
        <div id="analysisResult" style="font-size:14px;font-weight:600;color:var(--sub);line-height:1.8;"></div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
let uploadedFiles=[];

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFileList(e.dataTransfer.files);});

function handleFiles(e){handleFileList(e.target.files);}

function handleFileList(files){
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    const ext=file.name.split('.').pop().toLowerCase();
    const iconMap={txt:'ti-file-text',pdf:'ti-file-type-pdf',jpg:'ti-photo',jpeg:'ti-photo',png:'ti-photo',csv:'ti-table',json:'ti-braces',md:'ti-markdown'};
    const colorMap={pdf:'var(--red2)',jpg:'var(--green2)',jpeg:'var(--green2)',png:'var(--green2)',csv:'var(--amber2)',json:'var(--acc2)',txt:'var(--bg2)',md:'var(--bg2)'};
    reader.onload=ev=>{
      const content=ev.target.result;
      uploadedFiles.push({id:genId(),name:file.name,ext,size:file.size,content:typeof content==='string'?content.slice(0,5000):'[Binary file]',icon:iconMap[ext]||'ti-file',color:colorMap[ext]||'var(--bg2)'});
      renderFiles();
    };
    if(['jpg','jpeg','png'].includes(ext)) reader.readAsDataURL(file);
    else reader.readAsText(file);
  });
}

function deleteFile(id){uploadedFiles=uploadedFiles.filter(f=>f.id!==id);renderFiles();}

async function analyzeFile(id){
  const file=uploadedFiles.find(f=>f.id===id);
  if(!file)return;
  document.getElementById('fileAnalysis').style.display='block';
  document.getElementById('analysisResult').textContent='Analyzing...';
  try{
    const reply=await groqChat([{role:'user',content:`Analyze this file "${file.name}":\n\n${file.content}\n\nTell me: what is this file about, key information, and any important points. Hinglish mein.`}]);
    document.getElementById('analysisResult').innerHTML=reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  }catch(e){document.getElementById('analysisResult').textContent='Error — dobara try karo';}
}

function renderFiles(){
  const el=document.getElementById('fileList');
  if(uploadedFiles.length===0){el.innerHTML='';return;}
  el.innerHTML=uploadedFiles.map(f=>`
    <div class="file-item">
      <div class="file-icon" style="background:${f.color};"><i class="ti ${f.icon}" style="color:var(--sub);"></i></div>
      <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.name}</div><div style="font-size:12px;font-weight:600;color:var(--muted);">${(f.size/1024).toFixed(1)} KB</div></div>
      <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="analyzeFile('${f.id}')"><i class="ti ti-sparkles"></i>Analyze</button>
      <i class="ti ti-trash" style="font-size:17px;color:var(--muted);cursor:pointer;" onclick="deleteFile('${f.id}')"></i>
    </div>`).join('');
}
</script>
