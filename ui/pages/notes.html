<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E LIFE — Notes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/core.css">
<style>
.notes-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:160px;display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);}
.search-box i{font-size:15px;color:var(--muted);}
.search-box input{border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text);outline:none;width:100%;}
.search-box input::placeholder{color:var(--muted);font-weight:400;}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--acc2);border-color:var(--acc3);color:var(--acc);}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.note-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.15s;position:relative;display:flex;flex-direction:column;gap:8px;}
.note-card:hover{border-color:var(--acc3);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.note-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.note-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.3;}
.note-tag{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.note-preview{font-size:12px;font-weight:600;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.note-date{font-size:11px;font-weight:600;color:var(--muted);}
.note-actions{display:flex;gap:6px;opacity:0;transition:opacity 0.15s;}
.note-card:hover .note-actions{opacity:1;}
.note-actions i{font-size:15px;color:var(--muted);cursor:pointer;}
.note-actions i:hover{color:var(--acc);}
.note-pinned{position:absolute;top:10px;right:10px;font-size:14px;color:var(--amber);}
/* Editor */
.note-editor{display:none;flex-direction:column;height:100%;}
.note-editor.open{display:flex;}
.editor-toolbar{display:flex;gap:4px;padding:8px 0;border-bottom:0.5px solid var(--border);margin-bottom:12px;flex-wrap:wrap;}
.et-btn{width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.et-btn:hover{background:var(--bg2);color:var(--acc);}
.et-sep{width:0.5px;height:24px;background:var(--border);margin:0 4px;align-self:center;}
.editor-title{font-size:20px;font-weight:800;color:var(--text);border:none;outline:none;background:transparent;width:100%;margin-bottom:8px;font-family:inherit;}
.editor-body{flex:1;font-size:14px;font-weight:500;color:var(--text);border:none;outline:none;background:transparent;width:100%;resize:none;line-height:1.8;font-family:inherit;min-height:200px;}
.editor-meta{display:flex;gap:12px;align-items:center;padding:10px 0;border-top:0.5px solid var(--border);margin-top:8px;flex-wrap:wrap;}
.word-count{font-size:11px;font-weight:600;color:var(--muted);}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <a class="si" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><div class="si-body"><div class="si-name">Dashboard</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Personal</div>
      <a class="si" href="calendar.html"><i class="ti ti-calendar"></i><div class="si-body"><div class="si-name">Calendar</div></div></a>
      <a class="si" href="tasks.html"><i class="ti ti-checkbox"></i><div class="si-body"><div class="si-name">Tasks</div></div></a>
      <a class="si active" href="notes.html"><i class="ti ti-note"></i><div class="si-body"><div class="si-name">Notes</div></div></a>
      <a class="si" href="reminders.html"><i class="ti ti-clock"></i><div class="si-body"><div class="si-name">Reminders</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div>
      <div class="tb-title" id="pageTitle">Notes</div>
      <div class="tb-icons" id="topbarIcons">
        <i class="ti ti-plus" onclick="newNote()" title="New Note"></i>
        <i class="ti ti-sparkles" onclick="aiSummarize()" title="AI Summarize"></i>
      </div>
    </div>

    <!-- Notes List View -->
    <div class="page-content" id="listView">
      <div class="notes-toolbar">
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="searchInput" placeholder="Notes mein search karo..." oninput="render()"/>
        </div>
        <button class="btn btn-primary" onclick="newNote()"><i class="ti ti-plus"></i>New</button>
      </div>
      <div class="filter-row">
        <div class="filter-btn active" onclick="setFilter('all',this)">Sab</div>
        <div class="filter-btn" onclick="setFilter('pinned',this)">📌 Pinned</div>
        <div class="filter-btn" onclick="setFilter('personal',this)">Personal</div>
        <div class="filter-btn" onclick="setFilter('business',this)">Business</div>
        <div class="filter-btn" onclick="setFilter('idea',this)">💡 Ideas</div>
      </div>
      <div class="notes-grid" id="notesList"></div>
    </div>

    <!-- Editor View -->
    <div class="page-content" id="editorView" style="display:none;padding-top:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <button class="btn btn-secondary" onclick="closeEditor()"><i class="ti ti-arrow-left"></i>Back</button>
        <div style="flex:1;"></div>
        <select class="form-input" id="noteTag" style="width:auto;" onchange="saveCurrentNote()">
          <option value="personal">Personal</option>
          <option value="business">Business</option>
          <option value="idea">💡 Idea</option>
          <option value="meeting">Meeting</option>
          <option value="todo">Todo</option>
        </select>
        <button class="btn btn-secondary" onclick="togglePin()" id="pinBtn"><i class="ti ti-pin"></i></button>
        <button class="btn btn-primary" onclick="saveCurrentNote()"><i class="ti ti-check"></i>Save</button>
        <button class="btn btn-danger" onclick="deleteCurrentNote()"><i class="ti ti-trash"></i></button>
      </div>
      <div class="editor-toolbar">
        <button class="et-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
        <button class="et-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
        <button class="et-btn" onclick="fmt('underline')" title="Underline"><u>U</u></button>
        <div class="et-sep"></div>
        <button class="et-btn" onclick="insertText('• ')" title="Bullet">•</button>
        <button class="et-btn" onclick="insertText('1. ')" title="Numbered">1.</button>
        <button class="et-btn" onclick="insertText('☐ ')" title="Checkbox">☐</button>
        <div class="et-sep"></div>
        <button class="et-btn" onclick="aiEnhance()" title="AI Enhance"><i class="ti ti-sparkles" style="font-size:14px;"></i></button>
        <button class="et-btn" onclick="aiSummarizeNote()" title="AI Summary"><i class="ti ti-list" style="font-size:14px;"></i></button>
      </div>
      <input type="text" class="editor-title" id="editorTitle" placeholder="Note ka title..." oninput="autoSave()"/>
      <textarea class="editor-body" id="editorBody" placeholder="Yahan likho..." oninput="autoSave();updateWordCount()"></textarea>
      <div class="editor-meta">
        <span class="word-count" id="wordCount">0 words</span>
        <span class="word-count" id="lastSaved">Not saved</span>
      </div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <a class="mob-nav-item" href="../index.html"><i class="ti ti-message-circle"></i><span>Chat</span></a>
  <a class="mob-nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
  <a class="mob-nav-item" href="tasks.html"><i class="ti ti-checkbox"></i><span>Tasks</span></a>
  <a class="mob-nav-item active" href="notes.html"><i class="ti ti-note"></i><span>Notes</span></a>
  <a class="mob-nav-item" href="settings.html"><i class="ti ti-settings"></i><span>Settings</span></a>
</nav>

<script src="../assets/core.js"></script>
<script>
let notes = loadData('notes', []);
let filter = 'all';
let currentNoteId = null;
let autoSaveTimer = null;
const tagColors = {personal:'var(--acc2)',business:'var(--green2)',idea:'var(--amber2)',meeting:'#E6F1FB',todo:'var(--red2)'};
const tagText = {personal:'var(--acc)',business:'var(--green)',idea:'#633806',meeting:'#185FA5',todo:'var(--red)'};

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function newNote() {
  const note = {id:genId(), title:'', content:'', tag:'personal', pinned:false, created:new Date().toISOString(), updated:new Date().toISOString()};
  notes.unshift(note);
  saveData('notes', notes);
  openEditor(note.id);
}

function openEditor(id) {
  const note = notes.find(n => n.id === id);
  if(!note) return;
  currentNoteId = id;
  document.getElementById('editorTitle').value = note.title;
  document.getElementById('editorBody').value = note.content;
  document.getElementById('noteTag').value = note.tag || 'personal';
  document.getElementById('pinBtn').innerHTML = `<i class="ti ti-pin${note.pinned?'-filled':''}" style="${note.pinned?'color:var(--amber)':''}"></i>`;
  document.getElementById('listView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
  document.getElementById('editorTitle').focus();
  updateWordCount();
}

function closeEditor() {
  saveCurrentNote();
  currentNoteId = null;
  document.getElementById('listView').style.display = 'block';
  document.getElementById('editorView').style.display = 'none';
  render();
}

function saveCurrentNote() {
  if(!currentNoteId) return;
  const idx = notes.findIndex(n => n.id === currentNoteId);
  if(idx === -1) return;
  notes[idx].title = document.getElementById('editorTitle').value || 'Untitled';
  notes[idx].content = document.getElementById('editorBody').value;
  notes[idx].tag = document.getElementById('noteTag').value;
  notes[idx].updated = new Date().toISOString();
  saveData('notes', notes);
  document.getElementById('lastSaved').textContent = 'Saved ' + timeNow();
  showToast('Saved!', 'success');
}

function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    if(!currentNoteId) return;
    const idx = notes.findIndex(n => n.id === currentNoteId);
    if(idx === -1) return;
    notes[idx].title = document.getElementById('editorTitle').value || 'Untitled';
    notes[idx].content = document.getElementById('editorBody').value;
    notes[idx].updated = new Date().toISOString();
    saveData('notes', notes);
    document.getElementById('lastSaved').textContent = 'Auto-saved ' + timeNow();
  }, 1500);
}

function togglePin() {
  if(!currentNoteId) return;
  const idx = notes.findIndex(n => n.id === currentNoteId);
  if(idx === -1) return;
  notes[idx].pinned = !notes[idx].pinned;
  saveData('notes', notes);
  document.getElementById('pinBtn').innerHTML = `<i class="ti ti-pin${notes[idx].pinned?'-filled':''}" style="${notes[idx].pinned?'color:var(--amber)':''}"></i>`;
  showToast(notes[idx].pinned ? 'Pinned!' : 'Unpinned!', 'info');
}

function deleteCurrentNote() {
  if(!currentNoteId || !confirm('Delete karna chahte ho?')) return;
  notes = notes.filter(n => n.id !== currentNoteId);
  saveData('notes', notes);
  closeEditor();
  showToast('Note delete ho gaya!', 'info');
}

function fmt(cmd) {
  document.getElementById('editorBody').focus();
  document.execCommand(cmd);
}

function insertText(text) {
  const ta = document.getElementById('editorBody');
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + text + ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + text.length;
  ta.focus();
  autoSave();
}

function updateWordCount() {
  const text = document.getElementById('editorBody').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = `${words} words`;
}

async function aiEnhance() {
  const content = document.getElementById('editorBody').value.trim();
  if(!content) { showToast('Pehle kuch likho!', 'error'); return; }
  showToast('AI enhance kar raha hai...', 'info');
  try {
    const reply = await groqChat([{role:'user', content:`Improve this note — make it cleaner, better structured, and more detailed. Keep the same language (Hinglish/Hindi/English):\n\n${content}`}]);
    document.getElementById('editorBody').value = reply;
    autoSave();
    showToast('AI ne enhance kiya!', 'success');
  } catch(e) { showToast('Error!', 'error'); }
}

async function aiSummarizeNote() {
  const content = document.getElementById('editorBody').value.trim();
  if(!content) { showToast('Pehle kuch likho!', 'error'); return; }
  showToast('AI summarize kar raha hai...', 'info');
  try {
    const reply = await groqChat([{role:'user', content:`Summarize this note in 3-4 bullet points. Hinglish mein:\n\n${content}`}]);
    document.getElementById('editorBody').value = content + '\n\n--- AI Summary ---\n' + reply;
    autoSave();
    showToast('Summary add ho gayi!', 'success');
  } catch(e) { showToast('Error!', 'error'); }
}

function deleteNote(id, e) {
  e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  saveData('notes', notes);
  render();
  showToast('Deleted!', 'info');
}

function pinNote(id, e) {
  e.stopPropagation();
  const idx = notes.findIndex(n => n.id === id);
  if(idx === -1) return;
  notes[idx].pinned = !notes[idx].pinned;
  saveData('notes', notes);
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = notes.filter(n => {
    if(q && !n.title.toLowerCase().includes(q) && !n.content.toLowerCase().includes(q)) return false;
    if(filter === 'pinned') return n.pinned;
    if(filter === 'all') return true;
    return n.tag === filter;
  });
  filtered = [...filtered.filter(n=>n.pinned), ...filtered.filter(n=>!n.pinned)];
  const el = document.getElementById('notesList');
  if(filtered.length === 0) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i class="ti ti-note"></i><h3>Koi note nahi</h3><p>Plus se naya note banao</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="note-card" onclick="openEditor('${n.id}')">
      ${n.pinned ? '<i class="ti ti-pin-filled note-pinned"></i>' : ''}
      <div class="note-card-header">
        <div class="note-title">${n.title || 'Untitled'}</div>
        <span class="note-tag" style="background:${tagColors[n.tag]||'var(--acc2)'};color:${tagText[n.tag]||'var(--acc)'};">${n.tag}</span>
      </div>
      <div class="note-preview">${n.content || '(Empty note)'}</div>
      <div class="note-footer">
        <div class="note-date">${formatDate(n.updated || n.created)}</div>
        <div class="note-actions">
          <i class="ti ti-pin${n.pinned?'-filled':''}" onclick="pinNote('${n.id}',event)" style="${n.pinned?'color:var(--amber)':''}"></i>
          <i class="ti ti-trash" onclick="deleteNote('${n.id}',event)" style="color:var(--red);"></i>
        </div>
      </div>
    </div>`).join('');
}

render();
</script>
</body>
</html>
