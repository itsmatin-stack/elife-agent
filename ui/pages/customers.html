<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E LIFE — Customers</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/core.css">
<style>
.cust-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.search-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;}
.search-bar i{font-size:16px;color:var(--muted);}
.search-bar input{flex:1;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--text);outline:none;}
.cust-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;transition:all 0.15s;cursor:pointer;}
.cust-card:hover{border-color:var(--acc3);transform:translateX(2px);}
.cust-av{width:44px;height:44px;border-radius:50%;background:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--acc);flex-shrink:0;}
.cust-body{flex:1;min-width:0;}
.cust-name{font-size:14px;font-weight:800;color:var(--text);}
.cust-info{font-size:12px;font-weight:600;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cust-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.cust-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.cust-actions{display:flex;gap:8px;flex-shrink:0;}
.cust-actions i{font-size:18px;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;transition:all 0.15s;}
.cust-actions i:hover{background:var(--bg2);}
.wa-icon:hover{color:#25D366!important;}
.call-icon:hover{color:var(--green)!important;}
.del-icon:hover{color:var(--red)!important;}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <a class="si" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><div class="si-body"><div class="si-name">Dashboard</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Business</div>
      <a class="si active" href="customers.html"><i class="ti ti-users"></i><div class="si-body"><div class="si-name">Customers</div></div></a>
      <a class="si" href="orders.html"><i class="ti ti-shopping-cart"></i><div class="si-body"><div class="si-name">Orders</div></div></a>
      <a class="si" href="analytics.html"><i class="ti ti-chart-bar"></i><div class="si-body"><div class="si-name">Analytics</div></div></a>
      <a class="si" href="invoices.html"><i class="ti ti-receipt"></i><div class="si-body"><div class="si-name">Invoices</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Personal</div>
      <a class="si" href="tasks.html"><i class="ti ti-checkbox"></i><div class="si-body"><div class="si-name">Tasks</div></div></a>
      <a class="si" href="notes.html"><i class="ti ti-note"></i><div class="si-body"><div class="si-name">Notes</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div>
      <div class="tb-title">Customers</div>
      <div class="tb-icons"><i class="ti ti-plus" onclick="openModal('addModal')"></i></div>
    </div>
    <div class="page-content">
      <div class="cust-stats">
        <div class="stat-card"><div class="stat-val" id="totalCust">0</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card"><div class="stat-val" id="withPhone" style="color:var(--green)">0</div><div class="stat-lbl">With Phone</div></div>
        <div class="stat-card"><div class="stat-val" id="withEmail" style="color:var(--acc)">0</div><div class="stat-lbl">With Email</div></div>
      </div>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Naam, phone ya email se dhundho..." oninput="render()"/>
        <i class="ti ti-x" onclick="document.getElementById('searchInput').value='';render()" style="cursor:pointer;"></i>
      </div>
      <div id="custList"></div>
    </div>
  </div>
</div>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Naya Customer <i class="ti ti-x" onclick="closeModal('addModal')"></i></div>
    <div class="form-group"><label class="form-label">Naam *</label><input class="form-input" id="cName" placeholder="Customer ka naam..."/></div>
    <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="cPhone" placeholder="+91 XXXXXXXXXX" type="tel"/></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="cEmail" placeholder="email@example.com" type="email"/></div>
    <div class="form-group"><label class="form-label">City</label><input class="form-input" id="cCity" placeholder="Kahan se hai..."/></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-input" id="cCat">
        <option value="regular">Regular</option>
        <option value="vip">VIP</option>
        <option value="new">New</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="cNote" placeholder="Koi note..."/></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addCustomer()"><i class="ti ti-plus"></i>Add</button>
    </div>
  </div>
</div>

<!-- WhatsApp Modal -->
<div class="modal-overlay" id="waModal">
  <div class="modal">
    <div class="modal-title">WhatsApp — <span id="waName"></span> <i class="ti ti-x" onclick="closeModal('waModal')"></i></div>
    <div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="waMsg" rows="5" placeholder="Message likho..."></textarea></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn btn-secondary" onclick="aiDraftWA()"><i class="ti ti-sparkles"></i>AI Draft</button>
      <button class="btn btn-secondary" onclick="setWATemplate('followup')">Follow-up</button>
      <button class="btn btn-secondary" onclick="setWATemplate('payment')">Payment</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('waModal')">Cancel</button>
      <button class="btn btn-primary" style="background:#25D366;" onclick="sendWA()"><i class="ti ti-brand-whatsapp"></i>Send WhatsApp</button>
    </div>
  </div>
</div>

<!-- Customer Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-title" id="detailName">Customer <i class="ti ti-x" onclick="closeModal('detailModal')" style="cursor:pointer;color:var(--muted);float:right;"></i></div>
    <div id="detailBody"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
      <button class="btn btn-danger" id="detailDelete">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('detailModal')">Close</button>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <a class="mob-nav-item" href="../index.html"><i class="ti ti-message-circle"></i><span>Chat</span></a>
  <a class="mob-nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
  <a class="mob-nav-item active" href="customers.html"><i class="ti ti-users"></i><span>Customers</span></a>
  <a class="mob-nav-item" href="orders.html"><i class="ti ti-shopping-cart"></i><span>Orders</span></a>
  <a class="mob-nav-item" href="settings.html"><i class="ti ti-settings"></i><span>Settings</span></a>
</nav>

<script src="../assets/core.js"></script>
<script>
let customers = loadData('customers', []);
let waCustomer = null;
const catColors = {regular:'var(--acc2)',vip:'var(--amber2)',new:'var(--green2)',inactive:'var(--bg2)'};
const catText = {regular:'var(--acc)',vip:'#633806',new:'var(--green)',inactive:'var(--muted)'};

function addCustomer() {
  const name = document.getElementById('cName').value.trim();
  if(!name) { showToast('Naam zaroori hai!', 'error'); return; }
  customers.unshift({
    id:genId(), name,
    phone:document.getElementById('cPhone').value.trim(),
    email:document.getElementById('cEmail').value.trim(),
    city:document.getElementById('cCity').value.trim(),
    cat:document.getElementById('cCat').value,
    note:document.getElementById('cNote').value.trim(),
    created:new Date().toISOString()
  });
  saveData('customers', customers);
  ['cName','cPhone','cEmail','cCity','cNote'].forEach(id=>document.getElementById(id).value='');
  closeModal('addModal'); render();
  showToast('Customer add ho gaya!', 'success');
}

function deleteCustomer(id) {
  if(!confirm('Delete karna chahte ho?')) return;
  customers = customers.filter(c => c.id !== id);
  saveData('customers', customers);
  closeModal('detailModal'); render();
  showToast('Customer delete ho gaya!', 'info');
}

function showDetail(id) {
  const c = customers.find(x => x.id === id);
  if(!c) return;
  document.getElementById('detailName').innerHTML = `${c.name} <i class="ti ti-x" onclick="closeModal('detailModal')" style="cursor:pointer;color:var(--muted);float:right;"></i>`;
  document.getElementById('detailBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
      ${c.phone?`<div style="display:flex;gap:10px;align-items:center;"><i class="ti ti-phone" style="color:var(--acc);"></i><a href="tel:${c.phone}" style="font-size:14px;font-weight:700;color:var(--text);text-decoration:none;">${c.phone}</a></div>`:''}
      ${c.email?`<div style="display:flex;gap:10px;align-items:center;"><i class="ti ti-mail" style="color:var(--acc);"></i><a href="mailto:${c.email}" style="font-size:14px;font-weight:700;color:var(--text);text-decoration:none;">${c.email}</a></div>`:''}
      ${c.city?`<div style="display:flex;gap:10px;"><i class="ti ti-map-pin" style="color:var(--acc);"></i><span style="font-size:14px;font-weight:700;color:var(--text);">${c.city}</span></div>`:''}
      ${c.note?`<div style="display:flex;gap:10px;align-items:flex-start;"><i class="ti ti-note" style="color:var(--acc);margin-top:2px;"></i><span style="font-size:13px;font-weight:600;color:var(--sub);">${c.note}</span></div>`:''}
      <div style="display:flex;gap:8px;margin-top:8px;">
        ${c.phone?`<button class="btn btn-secondary" onclick="openWA('${c.id}')"><i class="ti ti-brand-whatsapp" style="color:#25D366;"></i>WhatsApp</button>`:''}
        ${c.phone?`<a href="tel:${c.phone}" class="btn btn-secondary"><i class="ti ti-phone"></i>Call</a>`:''}
      </div>
    </div>`;
  document.getElementById('detailDelete').onclick = () => deleteCustomer(id);
  openModal('detailModal');
}

function openWA(id) {
  waCustomer = customers.find(c => c.id === id);
  if(!waCustomer) return;
  document.getElementById('waName').textContent = waCustomer.name;
  document.getElementById('waMsg').value = '';
  closeModal('detailModal');
  openModal('waModal');
}

function setWATemplate(type) {
  const name = waCustomer?.name || 'Customer';
  const templates = {
    followup: `Namaste ${name} ji! 🙏\n\nAapka hamare saath kaam karna bahut achha laga. Kya aap hamare baare mein koi feedback dena chahenge?\n\nHumara dhanyavaad!`,
    payment: `Namaste ${name} ji! 🙏\n\nHum aapko yaad dilaana chahte hain ki aapka payment pending hai. Kripya jald se jald complete karein.\n\nShukriya!`
  };
  document.getElementById('waMsg').value = templates[type] || '';
}

async function aiDraftWA() {
  if(!waCustomer) return;
  document.getElementById('waMsg').value = 'AI likh raha hai...';
  try {
    const reply = await groqChat([{role:'user', content:`Write a short friendly WhatsApp message to customer "${waCustomer.name}". ${waCustomer.note?'Context: '+waCustomer.note:''} Keep it warm and professional. Hinglish mein. 3-4 lines max.`}]);
    document.getElementById('waMsg').value = reply;
  } catch(e) { document.getElementById('waMsg').value = ''; showToast('Error!', 'error'); }
}

function sendWA() {
  const msg = document.getElementById('waMsg').value.trim();
  if(!msg) { showToast('Message likho!', 'error'); return; }
  const phone = waCustomer?.phone?.replace(/[^0-9]/g,'');
  const url = phone ? `https://wa.me/91${phone}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  closeModal('waModal');
  showToast('WhatsApp khul raha hai!', 'success');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = customers.filter(c =>
    !q || c.name.toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.email||'').toLowerCase().includes(q) || (c.city||'').toLowerCase().includes(q)
  );
  document.getElementById('totalCust').textContent = customers.length;
  document.getElementById('withPhone').textContent = customers.filter(c=>c.phone).length;
  document.getElementById('withEmail').textContent = customers.filter(c=>c.email).length;
  const el = document.getElementById('custList');
  if(filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="ti ti-users"></i><h3>Koi customer nahi</h3><p>Plus se naya customer add karo</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(c => `
    <div class="cust-card" onclick="showDetail('${c.id}')">
      <div class="cust-av">${c.name[0].toUpperCase()}</div>
      <div class="cust-body">
        <div class="cust-name">${c.name}</div>
        <div class="cust-info">${[c.phone,c.email,c.city].filter(Boolean).join(' · ') || 'Koi info nahi'}</div>
        <div class="cust-tags">
          <span class="cust-tag" style="background:${catColors[c.cat]||'var(--acc2)'};color:${catText[c.cat]||'var(--acc)'};">${c.cat}</span>
          ${c.note?`<span class="cust-tag" style="background:var(--bg2);color:var(--muted);">📝 Note</span>`:''}
        </div>
      </div>
      <div class="cust-actions">
        ${c.phone?`<i class="ti ti-brand-whatsapp wa-icon" style="color:#25D366;" onclick="event.stopPropagation();openWA('${c.id}')"></i>`:''}
        ${c.phone?`<i class="ti ti-phone call-icon" onclick="event.stopPropagation();window.open('tel:${c.phone}')"></i>`:''}
        <i class="ti ti-trash del-icon" onclick="event.stopPropagation();if(confirm('Delete?')){customers=customers.filter(x=>x.id!=='${c.id}');saveData('customers',customers);render();}"></i>
      </div>
    </div>`).join('');
}

render();
</script>
</body>
</html>
