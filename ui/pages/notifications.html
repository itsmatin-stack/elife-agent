<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E LIFE — Notifications</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="E LIFE">
  <link rel="apple-touch-icon" href="../assets/icon.svg">
  <link rel="icon" href="../assets/icon.svg">
  <link rel="stylesheet" href="../assets/core.css">
  <style>
  @media(max-width:768px){
    .sb{position:fixed;top:0;bottom:0;left:0;z-index:100;transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
    .sb.collapsed{transform:translateX(-100%);}
    .main{width:100%;}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr!important;}
    .page-content{padding:12px;}
  }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <a class="si" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><div class="si-body"><div class="si-name">Dashboard</div></div></a>
      <a class="si active" href="notifications.html"><i class="ti ti-bell"></i><div class="si-body"><div class="si-name">Notifications</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">Notifications</div><div class="tb-icons"><i class="ti ti-checks" onclick="markAllRead()"></i></div></div>
    <div class="page-content" id="notifContent"></div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
function buildNotifications(){
  const notifs=[];
  const tasks=loadData('tasks',[]);
  const orders=loadData('orders',[]);
  const reminders=loadData('reminders',[]);
  const pendTasks=tasks.filter(t=>!t.done);
  if(pendTasks.length>0) notifs.push({type:'warning',icon:'ti-checkbox',title:`${pendTasks.length} tasks pending hain`,sub:'Tasks page mein dekho',link:'tasks.html',time:'Now'});
  const pendOrders=orders.filter(o=>o.status==='pending');
  if(pendOrders.length>0) notifs.push({type:'amber',icon:'ti-shopping-cart',title:`${pendOrders.length} orders pending hain`,sub:'Orders page mein dekho',link:'orders.html',time:'Now'});
  const dueReminders=reminders.filter(r=>!r.done&&r.time&&new Date(r.time)<new Date());
  if(dueReminders.length>0) notifs.push({type:'red',icon:'ti-clock',title:`${dueReminders.length} reminders due ho gaye!`,sub:'Reminders page mein dekho',link:'reminders.html',time:'Overdue'});
  notifs.push({type:'green',icon:'ti-sparkles',title:'E LIFE Agent ready hai',sub:'Aaj ka kaam shuru karo',link:'../index.html',time:'Always'});
  return notifs;
}

function markAllRead(){ showToast('Sab read mark ho gaya!','success'); }

function render(){
  const notifs=buildNotifications();
  const el=document.getElementById('notifContent');
  const typeColors={warning:'var(--acc2)',amber:'var(--amber2)',red:'var(--red2)',green:'var(--green2)'};
  const iconColors={warning:'var(--acc)',amber:'var(--amber)',red:'var(--red)',green:'var(--green)'};
  el.innerHTML=notifs.map(n=>`
    <a href="${n.link}" style="text-decoration:none;">
    <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:${typeColors[n.type]};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ${n.icon}" style="color:${iconColors[n.type]};font-size:18px;"></i></div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;color:var(--text);">${n.title}</div><div style="font-size:12px;font-weight:600;color:var(--muted);">${n.sub}</div></div>
      <span style="font-size:11px;font-weight:600;color:var(--muted);">${n.time}</span>
    </div></a>`).join('');
}
render();
</script>

<!-- Mobile Bottom Nav -->
<nav class="mob-nav">
  <a class="mob-nav-item" href="../index.html"><i class="ti ti-message-circle"></i><span>Chat</span></a>
  <a class="mob-nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
  <a class="mob-nav-item" href="tasks.html"><i class="ti ti-checkbox"></i><span>Tasks</span></a>
  <a class="mob-nav-item" href="customers.html"><i class="ti ti-users"></i><span>Customers</span></a>
  <a class="mob-nav-item" href="settings.html"><i class="ti ti-settings"></i><span>Settings</span></a>
</nav>
</body>
</html>
