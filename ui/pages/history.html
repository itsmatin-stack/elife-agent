<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="E LIFE">
  <link rel="apple-touch-icon" href="../assets/icon.svg">
  <link rel="icon" href="../assets/icon.svg">
  <link rel="stylesheet" href="../assets/core.css">
  <style>
  @media(max-width:768px){
    .sb{position:fixed;top:0;bottom:0;left:0;z-index:100;transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
    .sb.collapsed{transform:translateX(-100%);}
    .main{width:100%;}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr!important;}
    .page-content{padding:12px;}
  }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Memory</div>
      <a class="si" href="profile.html"><i class="ti ti-brain"></i><div class="si-body"><div class="si-name">My Profile</div></div></a>
      <a class="si active" href="history.html"><i class="ti ti-history"></i><div class="si-body"><div class="si-name">History</div></div></a>
      <a class="si" href="vault.html"><i class="ti ti-lock"></i><div class="si-body"><div class="si-name">Private Vault</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">Chat History</div><div class="tb-icons"><i class="ti ti-trash" onclick="clearHistory()"></i></div></div>
    <div class="page-content" id="histContent"></div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
function clearHistory(){
  if(!confirm('Sari history delete karni hai?'))return;
  saveData('chatSessions',[]);
  render(); showToast('History clear ho gayi!','info');
}
function render(){
  const sessions=loadData('chatSessions',[]);
  const el=document.getElementById('histContent');
  if(sessions.length===0){el.innerHTML=`<div class="empty-state" style="margin-top:60px;"><i class="ti ti-history"></i><h3>Koi history nahi</h3><p>Chat karo — history yahan dikhegi</p><a href="../index.html" class="btn btn-primary" style="text-decoration:none;margin-top:12px;"><i class="ti ti-message-circle"></i>Chat karo</a></div>`;return;}
  el.innerHTML=sessions.map(s=>`
    <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--acc2);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-message-circle" style="color:var(--acc);font-size:18px;"></i></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.title||'Chat'}</div>
        <div style="font-size:12px;font-weight:600;color:var(--muted);">${new Date(s.time).toLocaleString('en-IN')} · ${s.count||0} messages</div>
      </div>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none;padding:5px 10px;font-size:12px;"><i class="ti ti-arrow-right"></i>Open</a>
    </div>`).join('');
}
render();
</script>

  <a class="mob-nav-item" href="customers.html"><i class="ti ti-users"></i><span>Customers</span></a>
  <a class="mob-nav-item" href="settings.html"><i class="ti ti-settings"></i><span>Settings</span></a>
</nav>
</body>
</html>
