<body>
<div class="app-shell">
  <div class="sb" id="sidebar">
    <div class="sb-top"><div class="sb-logo"><div class="logo-icon"><div class="logo-e">E</div><div class="logo-dot"></div><div class="logo-life">LIFE</div></div><div><div class="logo-name">E LIFE</div><div class="online-dot">Online</div></div></div><div class="sb-search"><i class="ti ti-search"></i><input type="text" placeholder="Search..."/></div></div>
    <div class="sb-scroll">
      <div class="sec-label">Main</div>
      <a class="si" href="../index.html"><i class="ti ti-message-circle"></i><div class="si-body"><div class="si-name">Chat</div></div></a>
      <div class="sb-div"></div><div class="sec-label">Settings</div>
      <a class="si" href="settings.html"><i class="ti ti-settings"></i><div class="si-body"><div class="si-name">Settings</div></div></a>
      <a class="si active" href="apikeys.html"><i class="ti ti-key"></i><div class="si-body"><div class="si-name">API Keys</div></div></a>
      <a class="si" href="about.html"><i class="ti ti-info-circle"></i><div class="si-body"><div class="si-name">About</div></div></a>
    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">API Keys</div></div>
    <div class="page-content">
      <div class="card" style="max-width:500px;">
        <div class="card-title">Groq API Key</div>
        <div class="form-group"><label class="form-label">API Key</label><input class="form-input" id="groqKey" type="password" placeholder="gsk_..."/></div>
        <div style="background:var(--amber2);border-radius:var(--radius);padding:10px 12px;font-size:12px;font-weight:600;color:#633806;margin-bottom:14px;"><i class="ti ti-alert-triangle"></i> Key sirf is browser mein save hogi. Kisi ke saath share mat karo.</div>
        <button class="btn btn-primary" onclick="saveKey()"><i class="ti ti-check"></i>Save Key</button>
        <a href="https://console.groq.com" target="_blank" class="btn btn-secondary" style="text-decoration:none;margin-left:8px;"><i class="ti ti-external-link"></i>Get Free Key</a>
      </div>
    </div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
window.addEventListener('load', () => {
  const saved = localStorage.getItem('elife_groq_key');
  if(saved) document.getElementById('groqKey').value = saved;
});
function saveKey() {
  const key = document.getElementById('groqKey').value.trim();
  if(!key) { showToast('Key daalo pehle!','error'); return; }
  localStorage.setItem('elife_groq_key', key);
  showToast('Key save ho gayi! Page reload karo.','success');
}
</script>
