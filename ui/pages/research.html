  <meta name="apple-mobile-web-app-capable" content="yes">

<style>
.result-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}

.result-body{font-size:14px;font-weight:600;color:var(--sub);line-height:1.7;}
.search-box{display:flex;gap:8px;margin-bottom:20px;}
.search-box input{flex:1;padding:12px 16px;border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--card);color:var(--text);font-size:14px;font-weight:600;outline:none;font-family:inherit;}
.search-box input:focus{border-color:var(--acc3);}
.search-box input::placeholder{color:var(--muted);font-weight:400;}
</style>
</head>

    </div>
    <div class="sb-bot"><div class="theme-row" id="themeToggle"><div class="theme-lbl"><i class="ti ti-moon" id="themeIcon"></i><span id="themeLabel">Dark mode</span></div><div class="tgl" id="tgl"></div></div><div class="user-row"><div class="uav">EL</div><div><div class="uname">E LIFE User</div><div class="uplan">Groq powered</div></div><i class="ti ti-dots-vertical ml"></i></div></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tb-toggle" id="sidebarToggle"><i class="ti ti-layout-sidebar" id="toggleIcon"></i></div><div class="tb-title">Research</div></div>
    <div class="page-content">
      <div class="search-box">
        <input type="text" id="query" placeholder="Kuch bhi research karo — AI batayega..." onkeydown="if(event.key==='Enter')doResearch()"/>
        <button class="btn btn-primary" id="searchBtn" onclick="doResearch()"><i class="ti ti-search"></i>Research</button>
      </div>
      <div id="results"></div>
    </div>
  </div>
</div>
<script src="../assets/core.js"></script>
<script>
async function doResearch() {
  const q = document.getElementById('query').value.trim();
  if(!q) return;
  const btn = document.getElementById('searchBtn');
  btn.innerHTML='<i class="ti ti-loader" style="animation:spin 1s linear infinite;"></i> Searching...';
  btn.disabled=true;
  document.getElementById('results').innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-weight:600;">AI research kar raha hai...</div>';
  try {
    const reply = await groqChat([{role:'user',content:`Mujhe "${q}" ke baare mein detailed research karke batao. Points mein, clear aur structured format mein. Hinglish mein.`}]);
    document.getElementById('results').innerHTML=`<div class="result-card"><div class="result-title">📋 ${q}</div><div class="result-body">${reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')}</div></div>`;
  } catch(e) {
    document.getElementById('results').innerHTML='<div class="result-card"><div class="result-body">Error — dobara try karo.</div></div>';
  }
  btn.innerHTML='<i class="ti ti-search"></i>Research';
  btn.disabled=false;
}
document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey) && e.key==='k') document.getElementById('query').focus(); });
</script>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
